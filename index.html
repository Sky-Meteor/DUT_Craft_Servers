<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUT_Craft 服务器状态查询</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>
    <main class="layout">
      <header class="hero">
        <h1>DUT_Craft 服务器状态查询</h1>
        <p class="hero-subtitle">实时查询预设服务器在线状态、人数、MOTD 与版本信息</p>
        <button id="refresh-all" class="refresh-button" type="button" aria-label="刷新所有服务器状态">
          刷新全部服务器
        </button>
      </header>

      <section>
        <div id="status-board" class="server-grid" aria-live="polite"></div>
      </section>

      <footer class="site-footer">
        <span>API: </span>
        <a class="api-link" href="https://api.mcsrvstat.us/2" target="_blank" rel="noreferrer noopener">
          https://api.mcsrvstat.us/2
        </a>
      </footer>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
